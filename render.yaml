services:
  # 1. Backend Express API Web Service
  - type: web
    name: mywoods-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false

  # 2. Frontend React/Vite Static Site
  - type: web
    name: mywoods-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: mywoods-backend
          type: web
          property: url
